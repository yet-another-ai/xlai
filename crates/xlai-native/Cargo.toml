[package]
name = "xlai-native"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
default = ["openblas"]
openblas = ["xlai-backend-llama-cpp/openblas"]
metal = ["xlai-backend-llama-cpp/metal"]
vulkan = ["xlai-backend-llama-cpp/vulkan"]

[lints]
workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[dependencies]
xlai-backend-llama-cpp = { path = "../xlai-backend-llama-cpp" }
xlai-backend-openai = { path = "../xlai-backend-openai" }
xlai-backend-transformersjs = { path = "../xlai-backend-transformersjs" }
xlai-core = { path = "../xlai-core" }
xlai-runtime = { path = "../xlai-runtime" }
