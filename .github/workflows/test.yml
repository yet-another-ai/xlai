name: Unit Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: '0'
  VCPKG_ROOT: C:\vcpkg
  VCPKG_OPENBLAS_TRIPLET: x64-windows-static-md

jobs:
  unit-rust:
    name: Rust - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Short Cargo target dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\t | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "CARGO_TARGET_DIR=C:\t"

      - name: Setup Rust toolchain and native dependencies
        uses: ./.github/actions/setup-xlai-rust-native
        with:
          rust-cache-shared-key: unit-rust
          rust-cache-target-dir: ${{ runner.os == 'Windows' && 'C:\\t' || '' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run default workspace tests
        run: cargo test --locked --workspace

      - name: Check Rust documentation
        env:
          RUSTDOCFLAGS: '-D warnings'
        run: cargo doc --locked --workspace --no-deps

      - name: Build native examples
        run: cargo build --locked -p xlai-native --examples

  javascript:
    name: JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Vitest coverage report
        run: pnpm --filter @yai-xlai/xlai run build:wasm && pnpm --filter @yai-xlai/xlai exec vitest run --coverage
