name: Build
permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: '0'
  VCPKG_ROOT: C:\vcpkg
  VCPKG_OPENBLAS_TRIPLET: x64-windows-static-md

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        # MSBuild/ggml-vulkan nested paths exceed MAX_PATH under the default D:\a\...\workspace.
        working-directory: ${{ matrix.runner == 'windows-latest' && 'C:\\w' || '.' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            feature_set: vulkan
            cargo_features: xlai-ffi/vulkan
            artifact_path: target/x86_64-unknown-linux-gnu/release/libxlai_ffi.so
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            feature_set: vulkan
            cargo_features: xlai-ffi/vulkan
            artifact_path: |
              C:/w/target/x86_64-pc-windows-msvc/release/xlai_ffi.dll
              C:/w/target/x86_64-pc-windows-msvc/release/xlai_ffi.lib
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            feature_set: metal,vulkan
            cargo_features: xlai-ffi/metal,xlai-ffi/vulkan
            artifact_path: target/aarch64-apple-darwin/release/libxlai_ffi.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Mirror checkout to short path (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $src = $env:GITHUB_WORKSPACE
          $dest = 'C:\w'
          if (Test-Path -LiteralPath $dest) { Remove-Item -LiteralPath $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          robocopy $src $dest /E /XD target /R:2 /W:2 /NFL /NDL /NJH /NJS /np
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          $global:LASTEXITCODE = 0

      - name: Setup Rust toolchain and native dependencies
        uses: ./.github/actions/setup-xlai-rust-native
        with:
          rust-targets: ${{ matrix.target }}
          rust-cache-shared-key: build-native
          rust-cache-workspaces: ${{ runner.os == 'Windows' && 'C:/w -> target' || '' }}

      - name: Install Linux prerequisites (Vulkan)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslc libvulkan-dev

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest

      - name: Build native workspace
        run: cargo build --locked --release --workspace --exclude xlai-wasm --target ${{ matrix.target }} --features ${{ matrix.cargo_features }}

      - name: Upload xlai-ffi artifact
        uses: actions/upload-artifact@v7
        with:
          name: xlai-ffi-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  javascript:
    name: javascript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @yai-xlai/xlai package
        run: pnpm --filter @yai-xlai/xlai build

      - name: Upload @yai-xlai/xlai artifact
        uses: actions/upload-artifact@v7
        with:
          name: xlai-js-package
          path: |
            packages/xlai/dist
            packages/xlai/pkg
            packages/xlai/package.json
            packages/xlai/README.md
          if-no-files-found: error
