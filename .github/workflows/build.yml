name: Build
permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: '0'

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_path: target/x86_64-unknown-linux-gnu/release/libxlai_ffi.so
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_path: |
              target/x86_64-pc-windows-msvc/release/xlai_ffi.dll
              target/x86_64-pc-windows-msvc/release/xlai_ffi.lib
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact_path: target/x86_64-apple-darwin/release/libxlai_ffi.dylib
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_path: target/aarch64-apple-darwin/release/libxlai_ffi.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build native workspace
        run: cargo build --locked --release --workspace --exclude xlai-wasm --target ${{ matrix.target }}

      - name: Upload xlai-ffi artifact
        uses: actions/upload-artifact@v7
        with:
          name: xlai-ffi-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  javascript:
    name: javascript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @yai-xlai/xlai package
        run: pnpm --filter @yai-xlai/xlai build

      - name: Upload @yai-xlai/xlai artifact
        uses: actions/upload-artifact@v7
        with:
          name: xlai-js-package
          path: |
            packages/xlai/dist
            packages/xlai/pkg
            packages/xlai/package.json
            packages/xlai/README.md
          if-no-files-found: error
