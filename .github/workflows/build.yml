name: Build
permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_path: target/x86_64-unknown-linux-gnu/release/libxlai_ffi.so
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_path: |
              target/x86_64-pc-windows-msvc/release/xlai_ffi.dll
              target/x86_64-pc-windows-msvc/release/xlai_ffi.lib
          - name: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact_path: target/x86_64-apple-darwin/release/libxlai_ffi.dylib
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_path: target/aarch64-apple-darwin/release/libxlai_ffi.dylib
          - name: wasm32
            runner: ubuntu-latest
            target: wasm32-unknown-unknown
            artifact_path: target/wasm32-unknown-unknown/release/xlai_wasm.wasm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build native workspace
        run: cargo build --locked --release --workspace --exclude xlai-wasm --target ${{ matrix.target }}
      
      - name: Build wasm crate
        if: matrix.target == 'wasm32-unknown-unknown'
        run: cargo build --locked --release -p xlai-wasm --target wasm32-unknown-unknown

      - name: Upload xlai-ffi artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlai-ffi-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
