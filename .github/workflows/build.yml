name: Build
permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: '0'
  VCPKG_ROOT: C:\vcpkg
  VCPKG_OPENBLAS_TRIPLET: x64-windows-static-md

jobs:
  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            feature_set: vulkan
            cargo_features: xlai-ffi/vulkan
            artifact_path: target/x86_64-unknown-linux-gnu/release/libxlai_ffi.so
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            feature_set: vulkan
            cargo_features: xlai-ffi/vulkan
            artifact_path: |
              target/x86_64-pc-windows-msvc/release/xlai_ffi.dll
              target/x86_64-pc-windows-msvc/release/xlai_ffi.lib
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            feature_set: metal,vulkan
            cargo_features: xlai-ffi/metal,xlai-ffi/vulkan
            artifact_path: target/aarch64-apple-darwin/release/libxlai_ffi.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Windows vcpkg OpenBLAS
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-openblas-${{ runner.os }}-${{ env.VCPKG_OPENBLAS_TRIPLET }}-v1

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libasound2-dev

      - name: Install Windows OpenBLAS prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_ROOT

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            if (-not (Test-Path $vcpkgRoot)) {
              git clone https://github.com/microsoft/vcpkg $vcpkgRoot
            }
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          $env:VCPKG_INSTALLATION_ROOT = $vcpkgRoot
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_INSTALLATION_ROOT=$vcpkgRoot"
          & "$vcpkgRoot\vcpkg.exe" install "openblas:$env:VCPKG_OPENBLAS_TRIPLET"

          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_TARGET_TRIPLET=$env:VCPKG_OPENBLAS_TRIPLET"

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslc libvulkan-dev

      - name: Install macOS prerequisites
        if: runner.os == 'macOS'
        run: |
          brew install shaderc

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest

      - name: Build native workspace
        run: cargo build --locked --release --workspace --exclude xlai-wasm --target ${{ matrix.target }} --features ${{ matrix.cargo_features }}

      - name: Upload xlai-ffi artifact
        uses: actions/upload-artifact@v7
        with:
          name: xlai-ffi-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  javascript:
    name: javascript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @yai-xlai/xlai package
        run: pnpm --filter @yai-xlai/xlai build

      - name: Upload @yai-xlai/xlai artifact
        uses: actions/upload-artifact@v7
        with:
          name: xlai-js-package
          path: |
            packages/xlai/dist
            packages/xlai/pkg
            packages/xlai/package.json
            packages/xlai/README.md
          if-no-files-found: error
