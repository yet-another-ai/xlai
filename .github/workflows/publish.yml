name: Publish

# Dry-run (no registry credentials): pull requests and pushes to main.
# Real publish: push a tag matching v* (configure secrets on the `publish` environment).

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

env:
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: '0'
  # crates.io publish order (must match docs/development/publishing.md)
  PUBLISH_CRATES_ORDER: >-
    xlai-core
    xlai-runtime
    xlai-backend-openai
    xlai-backend-transformersjs

jobs:
  rust-crates-dry-run:
    name: Rust crates.io (dry-run)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type != 'tag')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libasound2-dev

      - name: cargo publish --dry-run (ordered)
        shell: bash
        run: |
          set -euo pipefail
          read -ra CRATES <<< "${PUBLISH_CRATES_ORDER//[$'\n\r']/ }"
          first="${CRATES[0]}"
          cargo publish -p "$first" --dry-run --locked
          for crate in "${CRATES[@]:1}"; do
            set +e
            out=$(cargo publish -p "$crate" --dry-run --locked 2>&1)
            code=$?
            set -e
            if [[ $code -eq 0 ]]; then
              continue
            fi
            printf '%s\n' "$out"
            if echo "$out" | grep -q 'no matching package named'; then
              echo "::warning::cargo publish --dry-run for ${crate} skipped: an upstream xlai crate is not on crates.io yet (expected until the first release chain is published)."
              continue
            fi
            exit "$code"
          done

  npm-dry-run:
    name: npm (dry-run)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type != 'tag')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @yai-xlai/xlai
        run: pnpm --filter @yai-xlai/xlai build

      - name: npm publish --dry-run
        working-directory: packages/xlai
        run: npm publish --dry-run

  rust-crates-publish:
    name: Rust crates.io (publish)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev libasound2-dev

      - name: Publish crates (ordered)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          read -ra CRATES <<< "${PUBLISH_CRATES_ORDER//[$'\n\r']/ }"
          for i in "${!CRATES[@]}"; do
            crate="${CRATES[$i]}"
            cargo publish -p "$crate" --locked
            if [[ $i -lt $((${#CRATES[@]} - 1)) ]]; then
              echo "Waiting for crates.io index (next: ${CRATES[$((i + 1))]})..."
              sleep 30
            fi
          done

  npm-publish:
    name: npm (publish)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @yai-xlai/xlai
        run: pnpm --filter @yai-xlai/xlai build

      - name: npm publish
        working-directory: packages/xlai
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
