name: E2E Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: '0'
  LLAMA_CPP_FIXTURE_PATH: fixtures/llama.cpp/Qwen3.5-0.8B-Q4_0.gguf
  LLAMA_CPP_FIXTURE_REPO: unsloth/Qwen3.5-0.8B-GGUF
  LLAMA_CPP_FIXTURE_FILE: Qwen3.5-0.8B-Q4_0.gguf
  VCPKG_ROOT: C:\vcpkg
  VCPKG_OPENBLAS_TRIPLET: x64-windows-static-md
  QTS_FIXTURE_PATH: fixtures/qts/Qwen3-TTS-12Hz-0.6B-Base-QTS
  QTS_FIXTURE_REPO: dsh0416/Qwen3-TTS-12Hz-0.6B-Base-QTS

jobs:
  e2e-rust:
    name: Rust - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    environment:
      name: e2e
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Windows vcpkg OpenBLAS
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-openblas-${{ runner.os }}-${{ env.VCPKG_OPENBLAS_TRIPLET }}-v1

      - name: Install Linux OpenBLAS prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenblas-dev \

      - name: Install Windows OpenBLAS prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_ROOT

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            if (-not (Test-Path $vcpkgRoot)) {
              git clone https://github.com/microsoft/vcpkg $vcpkgRoot
            }
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          $env:VCPKG_INSTALLATION_ROOT = $vcpkgRoot
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_INSTALLATION_ROOT=$vcpkgRoot"
          & "$vcpkgRoot\vcpkg.exe" install "openblas:$env:VCPKG_OPENBLAS_TRIPLET"

          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_TARGET_TRIPLET=$env:VCPKG_OPENBLAS_TRIPLET"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Cache llama.cpp test fixture
        uses: actions/cache@v5
        with:
          path: fixtures/llama.cpp
          key: llama-cpp-fixture-${{ env.LLAMA_CPP_FIXTURE_FILE }}-v1

      - name: Download llama.cpp test fixture
        shell: bash
        run: |
          mkdir -p "$(dirname "$LLAMA_CPP_FIXTURE_PATH")"
          hf download "$LLAMA_CPP_FIXTURE_REPO" "$LLAMA_CPP_FIXTURE_FILE" --repo-type model --local-dir "$(dirname "$LLAMA_CPP_FIXTURE_PATH")"
          test -f "$LLAMA_CPP_FIXTURE_PATH"

      - name: Download QTS test fixture
        shell: bash
        run: |
          mkdir -p "$(dirname "$QTS_FIXTURE_PATH")"
          hf download "$QTS_FIXTURE_REPO" qwen3-tts-0.6b-q8_0.gguf --repo-type model --local-dir "$(dirname "$QTS_FIXTURE_PATH")"
          hf download "$QTS_FIXTURE_REPO" qwen3-tts-vocoder.onnx --repo-type model --local-dir "$(dirname "$QTS_FIXTURE_PATH")"
          hf download "$QTS_FIXTURE_REPO" qwen3-tts-reference-codec.onnx --repo-type model --local-dir "$(dirname "$QTS_FIXTURE_PATH")"
          hf download "$QTS_FIXTURE_REPO" qwen3-tts-reference-codec-preprocess.json --repo-type model --local-dir "$(dirname "$QTS_FIXTURE_PATH")"
          test -f "$QTS_FIXTURE_PATH/qwen3-tts-0.6b-q8_0.gguf"
          test -f "$QTS_FIXTURE_PATH/qwen3-tts-vocoder.onnx"
          test -f "$QTS_FIXTURE_PATH/qwen3-tts-reference-codec.onnx"
          test -f "$QTS_FIXTURE_PATH/qwen3-tts-reference-codec-preprocess.json"

      - name: Run ignored e2e tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_TRANSCRIPTION_MODEL: ${{ vars.OPENAI_TRANSCRIPTION_MODEL }}
          OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL }}
          LLAMA_CPP_MODEL: ${{ github.workspace }}/${{ env.LLAMA_CPP_FIXTURE_PATH }}
          XLAI_QTS_MODEL_DIR: ${{ github.workspace }}/${{ env.QTS_FIXTURE_PATH }}
        run: >-
          cargo test --workspace -- --ignored

  e2e-javascript:
    name: JavaScript
    runs-on: ubuntu-latest
    environment:
      name: e2e
      deployment: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Run Playwright e2e tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_TRANSCRIPTION_MODEL: ${{ vars.OPENAI_TRANSCRIPTION_MODEL }}
          OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/xlai/playwright-report
          if-no-files-found: ignore
